<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
        }

        .div {
            background: #fff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: center;
        }

        #input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            margin-bottom: 15px;
            font-size: 16px;
        }

        #btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2575fc;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
        }

        #btn:hover {
            background: #1a5de0;
        }

        #ul {
            margin-top: 20px;
            list-style: none;
        }

        #ul li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f5f7fb;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        #ul button {
            background: #ff6b6b;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: .2s;
        }

        #ul button:hover {
            background: #e25555;
        }

        
    </style>

</head>

<body>
    <div class="div">
        <input type="text" id="input" placeholder="Enter some...">
        <input type="submit" id="btn" value="Click">

        <ul id="ul">
        </ul>
    </div>
    <script>

        const url = "https://6985996c6964f10bf253c8d2.mockapi.io/UserLogin"


        // Load list
        function loadData() {
            axios.get(url).then((res) => {
                let ul = document.getElementById("ul")
                ul.innerHTML = ""

                res.data.forEach((item) => {
                    let li = document.createElement("li")
                    li.innerHTML = `
                    ${item.Name} 
            <button onclick="update(${item.id})">Update</button>
            <button onclick="del(${item.id})">del</button>
            `
                    ul.append(li)
                })


            }).catch((err) => {
                console.log(err)
            })
        }


        // Add data
        document.getElementById("btn").addEventListener("click", () => {
            let input = document.getElementById("input").value
            if (input === "") return

            axios.post(url, { Name: input }).then(() => {
                document.getElementById("input").value = ""
                loadData()
            }).catch((err) => {
                console.log(err)
            })
        })

        // Update data
        function update(id) {
            let value = prompt("Change Value")
            if (!value) return

            axios.put(`${url}/${id}`, { Name: value }).then(() => {
                loadData()
            }).catch((err) => {
                console.log(err)
            })
        }

        // Delete

        function del(id) {
            axios.delete(`${url}/${id}`).then((res) => {
                console.log(res.data)
                alert("Deleted")
                loadData()
            }).catch((err) => console.log(err))
        }

        // initial load
        loadData()
        
    </script>

</body>

</html>
